<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="contactstyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Montserrat:wght@600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="section-one">
        <h1 class="section-one__title">Ajis Mohamed</h1>
        <p class="section-one__desc">Web Developer</p>
        <a href="index.html" class="section-one__link">Home</a>
    </div>

    <div class="section-two">
        <form>
            <table>
                <tr>
                    <td style="font-family: 'Montserrat', sans-serif; font-optical-sizing: auto;">Name:</td>
                    <td><input type="text" name="name" placeholder="Enter your name" class="section-two__input"></td>
                </tr>
                <tr>
                    <td style="font-family: 'Montserrat', sans-serif; font-optical-sizing: auto;">Email:</td>
                    <td><input type="email" name="email" placeholder="Enter your email" class="section-two__input"></td>
                </tr>
                <tr>
                    <td style="font-family: 'Montserrat', sans-serif; font-optical-sizing: auto;">Message:</td>
                    <td><textarea name="message" placeholder="Enter your message" rows="4" cols="50" class="section-two__textarea"></textarea></td>
                </tr>
                <tr>
                    <td> </td>
                    <td colspan="2">
                        <input type="submit" value="Submit" class="section-two__button" style="font-family: 'Montserrat', sans-serif; font-optical-sizing: auto;">
                    </td>
                </tr>
            </table>
        </form>
    </div>
    <div class="section-three">
        <p>
            Social Media:
            <a href="www.Linkedin.com" class="section-three__link">LinkedIN</a>
        </p>
        <p> &copy; 2023 Ajis Mohamed. All rights reserved.</p>
    </div>
</body>

</html>
